name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true  # Needed for audio files tracked with Git LFS
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Run Node.js tests with coverage
        run: npm run test:coverage
      
      - name: Install Puppeteer browser
        run: |
          rm -rf ~/.cache/puppeteer/chrome
          npx puppeteer browsers install chrome
      
      - name: Run browser tests
        run: npm run test:browser
        env:
          CI: true
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        if: ${{ always() && hashFiles('coverage/lcov.info') != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  build-pages:
    name: Build GitHub Pages artifact
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html CNAME LICENSE README.md dist/
          cp -R src assets tests dist/
          # Test-only harnesses are not part of the published site.
          rm -rf dist/tests/verification

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-pages
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
