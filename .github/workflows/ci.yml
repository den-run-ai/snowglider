name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  # Cancel superseded PR pushes to save CI minutes, but never cancel a run on
  # main: a push to main ends in the Pages deploy, and cancelling it mid-flight
  # surfaces as a red "Failed to deploy" on the Deployments page (and, if it
  # were the last successful run, could leave the site on stale content). Two
  # merges landing seconds apart used to cancel the earlier deploy this way;
  # letting main runs finish lets their deploys queue instead.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true  # Needed for audio files tracked with Git LFS
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Type-check tests (@ts-check'd suites)
        run: npm run typecheck:tests

      # Validate the production Vite bundle on every PR (tsc --noEmit above does
      # NOT run the bundler). Catches a build/transpile regression before merge so
      # it can't reach the Pages deploy. Same dist guard the build-pages job uses.
      - name: Production build (Vite) + dist guard
        run: |
          npm run build
          bash scripts/verify-pages-dist.sh

      - name: Run Node.js tests with coverage
        run: npm run test:coverage

      - name: Run Firestore rules tests
        run: npm run test:firebase
      
      - name: Install Puppeteer browser
        run: |
          rm -rf ~/.cache/puppeteer/chrome
          npx puppeteer browsers install chrome
      
      - name: Run browser tests
        run: npm run test:browser
        env:
          CI: true
          # Collect Chromium V8 coverage during the unified browser suite so the
          # browser-only src/ modules are counted. Writes coverage/browser/lcov.info.
          BROWSER_COVERAGE: 'true'

      - name: Merge browser coverage into LCOV
        # Line-merge c8 (Node + verification) coverage with the browser LCOV into
        # coverage/lcov.info before upload. Resilient: skips missing inputs, so it
        # is a no-op normalize if the browser run produced no coverage.
        if: always()
        run: npm run coverage:merge

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        if: ${{ always() && hashFiles('coverage/lcov.info') != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  e2e:
    name: Playwright E2E (cross-browser)
    runs-on: ubuntu-latest
    # Additive cross-browser/Safari + mobile-touch layer alongside the Puppeteer
    # suite (which still owns the in-page suites + the primary coverage pipeline).
    # Runs independently of `test`; it does NOT gate the Pages deploy (build-pages
    # only needs `test`). E2E_COVERAGE makes the chromium project also emit V8
    # coverage (coverage/e2e/lcov.info), uploaded to Codecov under the `e2e` flag so
    # it is combined server-side without threading a file across jobs (issue #133).
    #
    # Runs inside the official Playwright image so the version-matched chromium +
    # webkit AND their ~180 OS packages are pre-baked. This removes the
    # `playwright install --with-deps` step, whose apt download was wildly variable
    # on bare runners (43s on one run, 15min+ on the next). The image tag MUST track
    # the @playwright/test version in package.json (1.61.0) — bump them together.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        # No lfs: the specs boot the game but never assert on the LFS-tracked audio
        # asset (it loads on Start; a missing file is a media error, not a page
        # error), so we skip LFS and the git-lfs-in-container requirement.

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # No browser-install step: the container already provides chromium + webkit
      # and all their OS dependencies.

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # Collect Chromium V8 coverage during the e2e run; globalTeardown writes
          # coverage/e2e/lcov.info. WebKit/mobile projects skip collection.
          E2E_COVERAGE: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload e2e coverage to Codecov
        uses: codecov/codecov-action@v7
        # globalTeardown runs even when specs fail, so upload whatever coverage the
        # chromium run produced. No-op when the file is absent (flag unset / nothing
        # covered). Its own `e2e` flag keeps it additive to the `test` job's upload.
        if: ${{ always() && hashFiles('coverage/e2e/lcov.info') != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/e2e/lcov.info
          flags: e2e

  build-pages:
    name: Build GitHub Pages artifact
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build static site
        run: npm run build

      - name: Verify Pages artifact contents
        run: |
          test -f dist/index.html
          test -f dist/auth.html
          test -d dist/src
          test -d dist/assets
          test -d dist/tests
          test -f dist/CNAME
          test -f dist/LICENSE
          test -f dist/README.md
          test ! -d dist/tests/verification
          # Guard against a raw-TypeScript Pages artifact (defense-in-depth). The
          # real prod-outage fix was switching the Pages source to GitHub Actions
          # (build_type=workflow) so the legacy branch builder can't serve raw src/;
          # this fails the build if Vite ever stops emitting transpiled .js — which
          # on Pages is served as MIME video/mp2t and breaks every module
          # entrypoint. Shared with the per-PR test gate via this script.
          bash scripts/verify-pages-dist.sh
          # The verbatim-copied browser tests import bare `three`; Pages has no
          # node_modules, so the page import map's three build must be published.
          test -f dist/node_modules/three/build/three.module.min.js

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-pages
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
