# Coverage now GATES every PR at 90%. This reverses the earlier "informational,
# non-gating" policy (#122): the suite now exercises the previously browser-only
# fallback paths — boot/local-auth.js, boot/firebase-bootstrap.js, the collapsible
# HUD panel, the game-over result overlay, and the snowman collision test hooks —
# which lifts the project to ~92%. With that headroom a 90% floor no longer flaps on
# a couple of debug log lines (the failure mode that made #122 turn gating off).
#
# - project: overall coverage must stay >= 90%. The small threshold absorbs the
#   line-count noise between the Node, browser, and e2e sessions Codecov merges
#   server-side (a few tenths of a percent run to run).
# - patch: new / changed lines in a PR must be >= 90% covered, so new code cannot
#   erode the floor. Test files live outside src/ and carry no coverage, so a
#   tests-only PR has no coverable diff and passes.
#
# NOTE: these statuses post pass/fail on the PR but do not block a merge on their
# own. To make them required, add the `codecov/project` and `codecov/patch` checks
# to the branch protection rule for `main`.
coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 0.5%
    patch:
      default:
        target: 90%
        threshold: 0%

# Node tooling scripts (deploy-firestore-rules, analytics-report, purge-implausible-
# scores, audit-missed-main) are operational CLI utilities run manually or from
# workflows — not shipped app code (that is src/), so like tests/ they sit outside the
# coverage story. They normally never enter the report at all (no Node suite imports
# them), but a script that ships WITH a companion unit test gets V8-instrumented as an
# executed file, which would otherwise drag that PR's patch coverage under the 90% floor
# over its untested runtime (network / CLI) paths. Ignore the directory so tooling stays
# ungated, matching intent and the existing (uncovered) scripts.
ignore:
  - "scripts"
